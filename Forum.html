<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GSMFIX Forum - Login & Forgot Password</title>
  <style>
    /* পূর্বের CSS এখানে বিদ্যমান */
    :root {
      --orange: #ff6a00; --black: #080808; --card-bg: #181818;
      --text-main: #f2f2f2; --text-muted: #9ca3af; --border: #2a2a2a;
      --success: #22c55e;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--black); color: var(--text-main); margin: 0; }
    .hidden { display: none !important; }
    .navbar { position: fixed; top: 0; width: 100%; background: #111; border-bottom: 3px solid var(--orange); z-index: 1000; padding: 1rem; }
    .container { max-width: 1200px; margin: 0 auto; padding-top: 100px; }
    
    .auth-card { max-width: 400px; margin: 50px auto; background: var(--card-bg); padding: 2rem; border-radius: 1rem; border: 1px solid var(--border); text-align: center; }
    .form-group { text-align: left; margin-bottom: 1rem; position: relative; }
    .form-group label { display: block; font-size: 0.85rem; margin-bottom: 0.4rem; color: var(--text-muted); }
    .form-group input { width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid var(--border); background: #222; color: white; box-sizing: border-box; }
    
    /* Forgot Password Style */
    .forgot-link {
      display: block; text-align: right; font-size: 0.8rem; color: var(--orange); 
      margin-top: 0.5rem; cursor: pointer; text-decoration: none;
    }
    .forgot-link:hover { text-decoration: underline; }

    .btn { padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; border: none; width: 100%; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-primary { background: var(--orange); color: var(--black); margin-top: 1.5rem; }
    
    .btn-google { background: white; color: #444; margin-top: 1rem; border: 1px solid #ddd; }
    .divider { margin: 1.5rem 0; display: flex; align-items: center; color: var(--text-muted); font-size: 0.8rem; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); margin: 0 10px; }

    .error-msg { font-size: 0.85rem; margin-top: 1rem; min-height: 20px; }
    .status-red { color: #ff4444; }
    .status-green { color: var(--success); }

    .toggle-auth { margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted); cursor: pointer; }
    .toggle-auth span { color: var(--orange); font-weight: bold; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 1rem;">
      <span style="background:var(--orange); color:black; padding: 0.45rem 1rem; border-radius: 8px; font-weight:800;">GSMFIX</span>
      <button id="logoutBtn" class="btn hidden" style="width:auto; background:transparent; color:var(--orange); border: 1px solid var(--orange); padding: 0.4rem 1rem;">লগআউট</button>
    </div>
  </nav>

  <div class="container">
    
    <!-- Auth Page -->
    <div id="authPage">
      <div class="auth-card">
        <h2 id="authTitle" style="color:var(--orange); margin-bottom: 1.5rem;">লগইন করুন</h2>
        
        <div class="form-group">
          <label>ইমেইল</label>
          <input type="email" id="email" placeholder="example@mail.com">
        </div>
        
        <div class="form-group" id="passGroup">
          <label>পাসওয়ার্ড</label>
          <input type="password" id="password" placeholder="******">
          <!-- Forgot Password Link -->
          <a class="forgot-link" id="forgotPassBtn">পাসওয়ার্ড ভুলে গেছেন?</a>
        </div>
        
        <button id="authBtn" class="btn btn-primary">লগইন</button>
        
        <div class="divider">অথবা</div>
        <button id="googleBtn" class="btn btn-google">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google">
          Google দিয়ে এগিয়ে যান
        </button>

        <p id="errorBox" class="error-msg"></p>
        <p class="toggle-auth" id="toggleAuth">একাউন্ট নেই? <span id="toggleText">রেজিস্ট্রেশন করুন</span></p>
      </div>
    </div>

    <!-- Verification & Dashboard Pages (আগের মতোই থাকবে) -->
    <div id="verifyPage" class="hidden">
      <div class="auth-card">
        <h2 style="color:var(--orange);">ইমেইল ভেরিফিকেশন</h2>
        <p style="margin: 1.5rem 0;">We have sent you a verification email to <br><span id="userEmailDisplay" style="color:var(--orange); font-weight:bold;"></span>.<br>Please verify it and log in.</p>
        <button onclick="location.reload()" class="btn btn-primary">লগইন পেজে যান</button>
      </div>
    </div>

    <div id="dashboardPage" class="hidden">
      <div style="text-align: center; padding: 3rem 1rem;">
        <h1 style="color:var(--orange);">🛠️ GSMFIX ফোরাম</h1>
        <p>লগইন সফল হয়েছে। ফোরামে স্বাগতম!</p>
      </div>
    </div>

  </div>

<!-- ... (আপনার আগের HTML এবং CSS সব ঠিক আছে, শুধু স্ক্রিপ্ট অংশটি নিচেরটি দিয়ে রিপ্লেস করুন) ... -->

<script type="module">
  // ১. Firebase প্রয়োজনীয় ফাংশনগুলো ইমপোর্ট করা
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
    getAuth, 
    signInWithEmailAndPassword, 
    createUserWithEmailAndPassword, 
    onAuthStateChanged, 
    signOut, 
    sendEmailVerification, 
    sendPasswordResetEmail, 
    GoogleAuthProvider, 
    signInWithPopup 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  // ২. আপনার Firebase কনফিগারেশন
  const firebaseConfig = {
    apiKey: "AIzaSyBBXWXzMd5YECj9RVceFogPr7nYtxZXeBA",
    authDomain: "gsmfix-e325e.firebaseapp.com",
    projectId: "gsmfix-e325e",
    storageBucket: "gsmfix-e325e.firebasestorage.app",
    messagingSenderId: "1014692774714",
    appId: "1:1014692774714:web:4424babb0e0f430c738603"
  };

  // ৩. Firebase ইনিশিয়ালাইজ করা
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();

  // ৪. DOM এলিমেন্টগুলো সিলেক্ট করা
  const authPage = document.getElementById('authPage');
  const verifyPage = document.getElementById('verifyPage');
  const dashboardPage = document.getElementById('dashboardPage');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const authBtn = document.getElementById('authBtn');
  const googleBtn = document.getElementById('googleBtn');
  const forgotPassBtn = document.getElementById('forgotPassBtn');
  const errorBox = document.getElementById('errorBox');
  const logoutBtn = document.getElementById('logoutBtn');
  const toggleAuth = document.getElementById('toggleAuth');

  let isLoginMode = true; // ডিফল্ট মোড লগইন

  // ৫. পেজ পরিবর্তন করার ফাংশন
  function showPage(page) {
    authPage.classList.add('hidden');
    verifyPage.classList.add('hidden');
    dashboardPage.classList.add('hidden');
    logoutBtn.classList.add('hidden');

    if(page === 'auth') authPage.classList.remove('hidden');
    if(page === 'verify') verifyPage.classList.remove('hidden');
    if(page === 'dashboard') {
      dashboardPage.classList.remove('hidden');
      logoutBtn.classList.remove('hidden');
    }
  }

  // ৬. অথেনটিকেশন স্টেট অবজার্ভার (লগইন আছে কি নেই চেক করা)
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // যদি গুগল দিয়ে লগইন করে অথবা ইমেইল ভেরিফাইড হয়
      if (user.emailVerified || user.providerData[0].providerId === 'google.com') {
        showPage('dashboard');
      } else {
        // ইমেইল ভেরিফাইড না হলে ভেরিফিকেশন পেজে পাঠাও
        document.getElementById('userEmailDisplay').innerText = user.email;
        showPage('verify');
        signOut(auth); // লগআউট করে রাখা যাতে ভেরিফাই করে আবার লগইন করতে হয়
      }
    } else {
      showPage('auth');
    }
  });

  // ৭. 🛠️ মেইন লগইন/সাইনআপ বাটন লজিক (এটি ফিক্স করা হয়েছে)
  authBtn.addEventListener('click', async () => {
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();
    errorBox.className = "error-msg status-red";
    errorBox.innerText = "";

    if (!email || !password) {
      errorBox.innerText = "ইমেইল এবং পাসওয়ার্ড দিন।";
      return;
    }

    try {
      if (isLoginMode) {
        // লগইন লজিক
        await signInWithEmailAndPassword(auth, email, password);
      } else {
        // সাইনআপ লজিক
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        await sendEmailVerification(userCredential.user);
        errorBox.className = "error-msg status-green";
        errorBox.innerText = "রেজিস্ট্রেশন সফল! ইমেইল ভেরিফাই করুন।";
        // সাইন-আপের পর অটো ভেরিফিকেশন পেজে যাবে স্টেট চেঞ্জের মাধ্যমে
      }
    } catch (error) {
      console.error("Auth Error:", error.code);
      if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
        errorBox.innerText = "Email or password is incorrect";
      } else if (error.code === 'auth/email-already-in-use') {
        errorBox.innerText = "User already exists. Please sign in";
      } else if (error.code === 'auth/weak-password') {
        errorBox.innerText = "পাসওয়ার্ড অন্তত ৬ অক্ষরের হতে হবে।";
      } else {
        errorBox.innerText = "ভুল হয়েছে: " + error.message;
      }
    }
  });

  // ৮. গুগল সাইন-ইন লজিক
  googleBtn.addEventListener('click', async () => {
    try {
      await signInWithPopup(auth, googleProvider);
    } catch (error) {
      errorBox.innerText = "গুগল লগইন ব্যর্থ হয়েছে।";
    }
  });

  // ৯. পাসওয়ার্ড রিসেট লজিক
  forgotPassBtn.addEventListener('click', async () => {
    const email = emailInput.value.trim();
    if (!email) {
      errorBox.className = "error-msg status-red";
      errorBox.innerText = "আগে আপনার ইমেইলটি লিখুন।";
      return;
    }
    try {
      await sendPasswordResetEmail(auth, email);
      errorBox.className = "error-msg status-green";
      errorBox.innerText = "পাসওয়ার্ড রিসেট লিঙ্ক আপনার ইমেইলে পাঠানো হয়েছে।";
    } catch (error) {
      errorBox.className = "error-msg status-red";
      errorBox.innerText = "রিসেট করা যায়নি: " + error.message;
    }
  });

  // ১০. মোড টগল (লগইন <-> সাইনআপ)
  toggleAuth.addEventListener('click', () => {
    isLoginMode = !isLoginMode;
    document.getElementById('authTitle').innerText = isLoginMode ? "লগইন করুন" : "রেজিস্ট্রেশন করুন";
    authBtn.innerText = isLoginMode ? "লগইন" : "সাইন আপ";
    document.getElementById('toggleText').innerText = isLoginMode ? "রেজিস্ট্রেশন করুন" : "লগইন করুন";
    document.getElementById('passGroup').querySelector('.forgot-link').style.display = isLoginMode ? "block" : "none";
    errorBox.innerText = "";
  });

  // ১১. লগআউট
  logoutBtn.addEventListener('click', () => signOut(auth));

</script>
</body>
</html>
